<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- Top Navigation (Shell suppressed for Transactional Flow, but including TopAppBar for Branding as Anchor) -->
<header class="bg-white dark:bg-slate-950 border-b border-slate-100 dark:border-slate-900 sticky top-0 z-50">
<div class="flex items-center justify-between px-4 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="text-blue-600 dark:text-blue-400 active:scale-95 duration-150 p-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-50">PlannerTime</span>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-container-padding">
<div class="w-full max-w-md bg-surface-container-lowest p-8 rounded-xl shadow-none border border-outline-variant flex flex-col gap-stack-lg">
<!-- Brand & Hero -->
<div class="text-center space-y-2">
<h1 class="font-headline-md text-headline-md text-on-surface">Crea un Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Inizia a gestire i tuoi progetti in modo efficiente.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-stack-md" onsubmit="return false;">
<!-- Full Name -->
<div class="relative group">
<label class="absolute -top-2.5 left-3 bg-surface-container-lowest px-1 text-label-sm font-label-sm text-primary transition-all" for="full_name">Nome Completo</label>
<input class="w-full h-14 px-4 rounded-lg border border-outline focus:border-2 focus:border-primary outline-none bg-transparent font-body-lg text-body-lg placeholder:text-outline-variant transition-all" id="full_name" name="full_name" placeholder="Inserisci il tuo nome" type="text"/>
</div>
<!-- Email -->
<div class="relative group">
<label class="absolute -top-2.5 left-3 bg-surface-container-lowest px-1 text-label-sm font-label-sm text-outline group-focus-within:text-primary transition-all" for="email">Email</label>
<input class="w-full h-14 px-4 rounded-lg border border-outline focus:border-2 focus:border-primary outline-none bg-transparent font-body-lg text-body-lg placeholder:text-outline-variant transition-all" id="email" name="email" placeholder="example@email.com" type="email"/>
</div>
<!-- Password -->
<div class="relative group">
<label class="absolute -top-2.5 left-3 bg-surface-container-lowest px-1 text-label-sm font-label-sm text-outline group-focus-within:text-primary transition-all" for="password">Password</label>
<input class="w-full h-14 px-4 rounded-lg border border-outline focus:border-2 focus:border-primary outline-none bg-transparent font-body-lg text-body-lg placeholder:text-outline-variant transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Confirm Password -->
<div class="relative group">
<label class="absolute -top-2.5 left-3 bg-surface-container-lowest px-1 text-label-sm font-label-sm text-outline group-focus-within:text-primary transition-all" for="confirm_password">Conferma Password</label>
<input class="w-full h-14 px-4 rounded-lg border border-outline focus:border-2 focus:border-primary outline-none bg-transparent font-body-lg text-body-lg placeholder:text-outline-variant transition-all" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-3 px-1 py-2">
<input class="mt-1 w-5 h-5 rounded border-outline text-primary focus:ring-primary-container" id="terms" name="terms" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant leading-tight" for="terms">
            Accetto i <a class="text-primary font-medium hover:underline" href="#">Termini e le Condizioni</a> e la <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>.
          </label>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary text-on-primary rounded-full font-title-md text-title-md shadow-sm hover:bg-primary-container active:scale-95 transition-all duration-150 flex items-center justify-center gap-2" type="submit">
<span>Registrati</span>
<span class="material-symbols-outlined text-lg" data-icon="person_add">person_add</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-4 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
          Hai già un account? 
          <a class="text-primary font-title-md text-title-md hover:underline decoration-2 underline-offset-4" href="#">Accedi</a>
</p>
</div>
</div>
</main>
<!-- Illustration / Background Context (Asymmetric design element) -->
<aside class="hidden lg:flex fixed right-0 top-0 h-full w-1/3 bg-primary-container/10 items-center justify-center p-12 overflow-hidden">
<div class="relative w-full max-w-sm">
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-20 -left-20 w-80 h-80 bg-tertiary/5 rounded-full blur-3xl"></div>
<div class="relative bg-white/40 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-2xl space-y-6">
<div class="h-4 w-24 bg-primary/20 rounded-full"></div>
<div class="space-y-3">
<div class="h-2 w-full bg-on-surface-variant/10 rounded-full"></div>
<div class="h-2 w-4/5 bg-on-surface-variant/10 rounded-full"></div>
<div class="h-2 w-2/3 bg-on-surface-variant/10 rounded-full"></div>
</div>
<div class="flex gap-2">
<div class="h-10 w-10 rounded-full bg-secondary-container"></div>
<div class="h-10 w-10 rounded-full bg-tertiary-fixed-dim"></div>
<div class="h-10 w-10 rounded-full bg-primary-fixed"></div>
</div>

</div>
</div>
</aside>
<!-- Navigation Suppression (BottomNavBar not rendered for focus on registration flow) -->
</body></html>
