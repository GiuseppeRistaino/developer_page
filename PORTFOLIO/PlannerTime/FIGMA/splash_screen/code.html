<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes progress-loading {
            0% { width: 0%; left: 0%; }
            50% { width: 40%; left: 30%; }
            100% { width: 0%; left: 100%; }
        }

        .loading-bar-animation {
            animation: progress-loading 2s infinite ease-in-out;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<body class="bg-surface font-body-md text-on-surface m-0 p-0 overflow-hidden h-screen w-screen flex flex-col justify-center items-center">
<div class="flex flex-col items-center justify-center space-y-6 fade-in">
<!-- Logo Section -->
<div class="w-[120px] h-[120px] shadow-sm rounded-3xl overflow-hidden bg-white flex items-center justify-center">
<img alt="PlannerTime Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uiLGvay7prvenbbl05yJ1AzDkwGZon7K-nOiph_CSxN5kwzsXRXPTjkd-B0pq6yvhqleb9tRj4YBg_vDy6q-7mVnw1-58_w_dmIOqp7MGS6kEvC5RQ5EetN5w42sjK8suf8c-L_nbLRtQvCGPCZWBLJ6sFC7YnX-aJJBUcnm0H80p8Qz4_MEXqZrYJrEZjFtuDEJ2uQ2zLFLVoa13y4B4nxspLzIjXp9hqViNYIul2RSn7KV2jrQMb5E8TB"/>

<h1 class="font-headline-md text-headline-md text-primary-container tracking-tight">

            </h1>
<p class="font-label-lg text-label-lg text-secondary mt-1 opacity-70">
                Design your day with precision
            </p>
</div>
</div>
<!-- Loading Indicator Section -->
<div class="fixed bottom-16 w-full px-12 flex flex-col items-center space-y-4">
<div class="w-48 h-1 bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute top-0 h-full bg-primary-container loading-bar-animation rounded-full"></div>
</div>
<span class="font-label-sm text-label-sm text-outline tracking-widest uppercase">
            Syncing Workspace
        </span>
</div>
<script>
        // Subtle interaction to simulate a real app launch feel
        document.addEventListener('DOMContentLoaded', () => {
            console.log('PlannerTime Splash Screen Initialized');
            
            // Interaction: Subtle parallax on logo based on mouse/tilt if available
            window.addEventListener('mousemove', (e) => {
                const logo = document.querySelector('.fade-in');
                const x = (window.innerWidth / 2 - e.pageX) / 40;
                const y = (window.innerHeight / 2 - e.pageY) / 40;
                logo.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body></html>
